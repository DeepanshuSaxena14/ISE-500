name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy-api:
    name: Deploy Fleet API → Railway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy dispatchiq-api (app.py)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd backend
          railway up \
            --service dispatchiq-api \
            --detach

      - name: Confirm
        run: echo "Fleet API deployed at $(date -u)"

  deploy-chat:
    name: Deploy AI Chat → Railway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy dispatchiq-chat (chat_service.py)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd backend
          railway up \
            --service dispatchiq-chat \
            --detach

      - name: Confirm
        run: echo "AI Chat service deployed at $(date -u)"