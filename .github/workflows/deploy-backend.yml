# ================================================================
# DispatchIQ — Backend Deploy (Railway)
# Triggers on every push to main that touches backend/ files.
# Deploys TWO Railway services:
#   1. dispatchiq-api   → python app.py        (port 8000)
#   2. dispatchiq-chat  → python chat_service.py (port 5001)
# ================================================================

name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy-api:
    name: Deploy Fleet API → Railway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy ISE-500 (app.py)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          cd backend
          railway up \
            --service ISE-500 \
            --detach

      - name: Confirm
        run: echo "Fleet API deployed at $(date -u)"

  deploy-chat:
    name: Deploy AI Chat → Railway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy dynamic-analysis (chat_service.py)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          cd backend
          railway up \
            --service dynamic-analysis \
            --detach

      - name: Confirm
        run: echo "AI Chat service deployed at $(date -u)"